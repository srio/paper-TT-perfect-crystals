name: Build LaTeX

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache TeX Live
        id: cache-texlive
        uses: actions/cache@v4
        with:
          path: /usr/share/texlive
          key: texlive-full-2024

      - name: Install TeX Live (if not cached)
        if: steps.cache-texlive.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full

      - name: Compile (pdflatex + bibtex sequence)
        run: |
          pdflatex -interaction=nonstopmode main.tex
          bibtex main
          pdflatex -interaction=nonstopmode main.tex
          pdflatex -interaction=nonstopmode main.tex

      - name: Commit PDF to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main.pdf
          git diff --cached --quiet || git commit -m "Update main.pdf [skip ci]"
          git push

